name: Atualizar Dashboard

on:
  push:
    paths:
      - 'dados/**.xlsx'   # dispara apenas quando um .xlsx é enviado para /dados/

permissions:
  contents: write        # necessário para fazer commit do index.html gerado

jobs:
  gerar:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: pip install pandas openpyxl

      - name: Gerar index.html
        run: python gerar_dashboard.py

      - name: Commitar e publicar
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --cached --quiet || git commit -m "Dashboard atualizado - $(date +'%d/%m/%Y %H:%M')"
          git push
